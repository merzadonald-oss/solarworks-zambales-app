kind = "mobile"
previewPath = "/"
title = "SolarWorks Zambales"
version = "1.0.0"
id = "artifacts/solarworks"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21407

[services.development]
run = "pnpm --filter @workspace/solarworks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solarworks", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/solarworks", "run", "serve" ]

[services.env]
PORT = "21407"
BASE_PATH = "/"
